<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto+Mono:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script src="javascript.js"></script>
    <title>Document</title>
</head>
<body>

    <main>
        <div class="gameContainer">

            <div class="titleContainer">
                <div class="text">
                    <h1>Tic Tac Toe</h1>
                    <h2>Three in a row</h2>
                </div>  
            </div>

            <div class="sides">
                <div class="playerCard">
                    <p>X</p>
                    <p class="playerXWins">0</p>
                </div>
            </div>

            <div class="gameBoardContainer">
                <div class="gameBoard">
                    <div class="boardSquares sq1"></div>
                    <div class="boardSquares sq2"></div>
                    <div class="boardSquares sq3"></div>
                    <div class="boardSquares sq4"></div>
                    <div class="boardSquares sq5"></div>
                    <div class="boardSquares sq6"></div>
                    <div class="boardSquares sq7"></div>
                    <div class="boardSquares sq8"></div>
                    <div class="boardSquares sq9"></div>
                </div>
            </div>

            <div class="sides">
                <div class="playerCard">
                    <p>O</p>
                    <p class="playerOWins">0</p>
                </div>
            </div>

            <div class="infoContainer">
                <div class="gameInfo">
                    <p class="gameInfoText">Turn: X</p>
                </div>
            </div>

        </div>
    </main>
    
</body>
</html>
